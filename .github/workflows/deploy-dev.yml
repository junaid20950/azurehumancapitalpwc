name: Deploy to Development

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  transform-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          pip install databricks-cli pyyaml
      
      - name: Deploy Notebooks to Databricks
        run: |
          python scripts/deploy-notebooks.py dev
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_DEV_TOKEN }}
      
      - name: Deployment Summary
        if: always()
        run: |
          echo "✓ Development deployment completed"
          echo "Environment: Development"
          echo "Branch: dev"
          echo "Timestamp: $(date)"
